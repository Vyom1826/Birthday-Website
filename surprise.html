<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Special Surprise ❤️</title>

    <link rel="stylesheet" href="css/surprise.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Floating Background -->

    <div id="hearts"></div>

    <div id="sparkles"></div>

    <!-- Main Card -->

    <div class="card">

        <h1>✨ A Special Surprise ✨</h1>

        <p class="subtitle">

            You completed every memory...

            <br><br>

            One last surprise is waiting for you ❤️

        </p>

        <h2>

            Do you want to see it?

        </h2>

        <div class="buttons">

            <button id="yesBtn">

                ❤️ YES

            </button>

            <button id="noBtn">

                🙈 NO

            </button>

        </div>

        <p id="message"></p>

    </div>

    <script src="js/surprise.js"></script>

</body>

</html>
