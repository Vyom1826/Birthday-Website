<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Memories ❤️</title>

    <link rel="stylesheet" href="css/camera.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="background"></div>

    <!-- Flash -->
    <div id="flash"></div>

    <div class="container">

        <h1>Our Beautiful Memories ❤️</h1>

        <p class="subtitle">
            Every picture tells a beautiful story...
        </p>

        <!-- Camera -->
        <div class="camera" id="camera">

            <div class="lens"></div>

            <div class="flash-light"></div>

            <div class="shutter" id="shutter">
                📸
            </div>

        </div>

        <!-- Polaroid -->

        <!-- Printed Memories -->

        <div class="memory-board" id="memoryBoard">

        </div>



        <button id="nextBtn" class="hidden">

            Next Memory →

        </button>
    </div>

    <script src="js/camera.js"></script>

</body>

</html>
