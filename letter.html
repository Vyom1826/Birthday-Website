<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Letter For Mahi ❤️</title>

    <link rel="stylesheet" href="css/letter.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Dancing+Script:wght@700&family=Caveat:wght@500;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="background"></div>

    <div class="container">

        <div class="envelope" id="envelope">

            <!-- Letter -->

            <div class="letter-preview" id="letterPreview">

            </div>

            <!-- Back -->

            <div class="envelope-back">

            </div>

            <!-- Flap -->

            <div class="flap" id="flap">

            </div>

            <!-- Wax -->

            <div class="wax" id="wax">

                ❤

            </div>

        </div>

        <p class="hint" id="hint">

            Click the Wax Seal ❤️

        </p>

        <!-- Hidden Diary -->

        <section class="diary" id="diary">

            <div class="paper">

                <div class="bookmark"></div>

                <div class="corner tl">🌸</div>
                <div class="corner tr">🌹</div>
                <div class="corner bl">💖</div>
                <div class="corner br">🌷</div>

                <h1>

                    Dear Mahi ❤️

                </h1>

                <div id="typing">

                </div>

                <div id="signature">

                    With Lots Of Love,

                    <br>

                    <span>

                        Vyom ❤️

                    </span>

                </div>

                <button id="continueBtn" type="button">
                    Continue →
                </button>
            </div>

        </section>

    </div>

    <script src="js/letter.js"></script>

</body>

</html>
