<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memory Room ❤️</title>

    <link rel="stylesheet" href="css/memory.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Floating Background -->

    <div class="memory-bg">

        <div class="glass g1"></div>
        <div class="glass g2"></div>
        <div class="glass g3"></div>
        <div class="glass g4"></div>
        <div class="glass g5"></div>
        <div class="glass g6"></div>
        <div class="glass g7"></div>
        <div class="glass g8"></div>

    </div>

    <div class="spotlight"></div>

    <div class="container">

        <div class="glass-card" id="glassCard">

            <h1>Our Memory Room ❤️</h1>

            <p>

                Every memory hides a beautiful surprise.

                <br>

                Complete all three memories to unlock the next journey.

            </p>

            <div class="cards">

                <!-- CAMERA -->

                <div class="memory-card" id="cameraCard">

                    <div class="camera">

                        <div class="camera-top"></div>

                        <div class="camera-body">

                            <div class="flash"></div>

                            <div class="lens">

                                <div class="lens-inner"></div>

                            </div>

                            <div class="small-lens"></div>

                        </div>

                    </div>

                    <h2>Camera</h2>

                    <span>Capture Our Memories</span>

                </div>

                <!-- GIFT -->

                <div class="memory-card" id="giftCard">

                    <div class="gift">

                        <div class="gift-box">

                            <div class="vertical-ribbon"></div>

                            <div class="horizontal-ribbon"></div>

                        </div>

                        <div class="gift-lid">

                            <div class="vertical-ribbon"></div>

                            <div class="horizontal-ribbon"></div>

                            <div class="bow bow-left"></div>

                            <div class="bow bow-right"></div>

                        </div>

                    </div>

                    <h2>Gift</h2>

                    <span>Open Your Surprise</span>

                </div>

                <!-- LETTER -->

                <div class="memory-card" id="letterCard">

                    <div class="envelope">

                        <div class="envelope-back"></div>

                        <div class="letter-paper"></div>

                        <div class="envelope-flap"></div>

                        <div class="seal"></div>

                    </div>

                    <h2>Letter</h2>

                    <span>Read My Heart</span>

                </div>

            </div>

        </div>

    </div>

    <script src="js/memory.js"></script>

</body>

</html>
