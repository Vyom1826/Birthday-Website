<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Surprise ❤️</title>

    <!-- Google Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Floating Background -->

    <div class="background">

        <span class="heart h1">❤</span>
        <span class="heart h2">❤</span>
        <span class="heart h3">❤</span>
        <span class="heart h4">❤</span>
        <span class="heart h5">❤</span>

        <div class="blur blur1"></div>
        <div class="blur blur2"></div>
        <div class="blur blur3"></div>

    </div>

    <!-- Main Container -->

    <main class="container">

        <!-- Left Side -->

        <section class="photo-section">

            <div class="polaroid">

                <img src="assets/photo3.jpg" alt="Mahi">

                <div class="caption">
                    Our Beautiful Memories ❤️
                </div>

                <div class="ribbon"></div>

            </div>

        </section>

        <!-- Right Side -->

        <section class="pin-section">

            <div class="glass-card">

                <h1>
                    A Special Surprise Awaits You 💖
                </h1>

                <p>
                    Enter your secret PIN to unlock your birthday journey.
                </p>

                <!-- PIN BOXES -->

                <div class="pin-display">

                    <div class="pin-box"></div>
                    <div class="pin-box"></div>
                    <div class="pin-box"></div>
                    <div class="pin-box"></div>

                </div>

                <!-- Error -->

                <p id="message"></p>

                <!-- Keypad -->

                <div class="keypad">

                    <button class="key">1</button>
                    <button class="key">2</button>
                    <button class="key">3</button>

                    <button class="key">4</button>
                    <button class="key">5</button>
                    <button class="key">6</button>

                    <button class="key">7</button>
                    <button class="key">8</button>
                    <button class="key">9</button>

                    <button id="delete">⌫</button>
                    <button class="key">0</button>
                    <button id="clear">✕</button>

                </div>

            </div>

        </section>

    </main>

    <script src="js/main.js"></script>

</body>

</html>
