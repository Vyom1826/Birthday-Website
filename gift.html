<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Birthday Gift</title>

    <link rel="stylesheet" href="css/gift.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="bg"></div>

    <div id="particles"></div>

    <div class="container">

        <h1 class="title">
            A Special Gift For You ❤️
        </h1>

        <p class="subtitle">
            Click the ribbon to open your surprise...
        </p>

        <div class="gift" id="gift">

            <!-- Lid -->
            <div class="lid" id="lid">

                <div class="ribbon-v"></div>

                <div class="ribbon-h"></div>

                <div class="bow" id="bow">
                    🎀
                </div>

            </div>

            <!-- Box -->
            <div class="box">

                <div class="box-ribbon"></div>

            </div>

            <!-- Glow -->
            <div class="glow" id="glow"></div>

            <!-- Birthday Message -->
            <div class="magic-letter" id="giftMessage">

                <div class="letter-top"></div>

                <div class="letter-paper">

                    <h2 id="messageTitle"></h2>

                    <p id="messageText"></p>

                    <button id="continueBtn">

                        Continue →

                    </button>

                </div>

            </div>

            <!-- Continue -->

            <button id="continueBtn">

                Continue →

            </button>

        </div>

    </div>

    <script src="js/gift.js"></script>

</body>

</html>
